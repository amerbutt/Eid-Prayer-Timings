<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Eid Prayer Timings - D-12</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <header class="hero" role="banner">
      <div class="hero-media" aria-hidden="true">
        <img src="EidMubarak.jpg" alt="" />
      </div>
      <div class="hero-overlay">
        <div class="container hero-inner">
          <div class="hero-title">
            <p class="eyebrow">D-12 Community</p>
            <h1>Eid Prayer Timings</h1>
            <p class="subtitle">Mosques, addresses, prayer time, and countdown.</p>
          </div>

          <div class="hero-side">
            <div class="lang-toggle" aria-label="Language toggle">
              <button id="btn-en" class="lang-btn active" type="button">English</button>
              <button id="btn-ur" class="lang-btn" type="button">اردو</button>
            </div>
          </div>
        </div>
      </div>
    </header>

    <main>
      <section class="greeting" aria-label="Eid greeting">
        <div class="container greeting-inner">
          <h2 id="greeting-title">Eid Mubarak</h2>
          <p id="greeting-body" class="muted">
            May Allah accept our عبادات, forgive our shortcomings, and bless our homes with peace.
          </p>
        </div>
      </section>

      <section class="container">
        <section id="mosque-list" class="mosque-list" aria-label="Mosque timings"></section>
      </section>
    </main>

    <footer class="footer">
      <div class="container footer-inner">
        <div>
          <div id="footer-built">Built for the D-12 community.</div>
          <div id="footer-sign" class="muted">Humble requester of prayers, Amer Butt</div>
        </div>
        <div id="footer-note" class="muted">Please cross-check addresses before leaving.</div>
      </div>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
